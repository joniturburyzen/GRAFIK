<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Datos (MVP)</title>
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Librerías -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.25.0/dist/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false });
        window.mermaid = mermaid;
    </script>
    <style>
        .error-msg { color: #ef4444; font-size: 0.75rem; margin-top: 0.25rem; display: none; }
        .has-error { border-color: #ef4444; }
        .node-row, .conn-row { transition: all 0.2s; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-indigo-600 text-white p-4 shadow">
        <h1 class="text-xl font-bold">Visualizador de Datos</h1>
    </header>

    <main class="flex-1 p-4 max-w-5xl mx-auto w-full space-y-6">
        
        <!-- Controles -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-4 rounded shadow">
            <div>
                <label class="block text-sm font-medium mb-1">Visualización</label>
                <select id="viz-type" class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500">
                    <option value="bar">Barras</option>
                    <option value="line">Líneas</option>
                    <option value="network">Node-Link (Red)</option>
                    <option value="flowchart">Flowchart</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Origen de Datos</label>
                <div class="flex space-x-4 mt-2">
                    <label class="flex items-center"><input type="radio" name="source" value="form" checked class="mr-2"> Formulario</label>
                    <label class="flex items-center"><input type="radio" name="source" value="file" class="mr-2"> Archivo (CSV)</label>
                </div>
            </div>
        </div>

        <!-- Formulario Dinámico -->
        <div id="form-container" class="bg-white p-4 rounded shadow space-y-4">
            <!-- Se inyecta vía JS -->
        </div>

        <!-- Acciones -->
        <div class="flex justify-between items-center">
            <button id="btn-add" class="px-4 py-2 bg-indigo-100 text-indigo-700 rounded hover:bg-indigo-200 font-medium">+ Añadir Fila</button>
            <button id="btn-generate" class="px-6 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-bold shadow">Generar Gráfico</button>
        </div>

        <!-- Resultado -->
        <div id="chart-container" class="bg-white p-4 rounded shadow min-h-[400px] flex items-center justify-center relative">
            <p class="text-gray-400">El gráfico aparecerá aquí</p>
        </div>

        <!-- Download -->
        <button id="btn-download" class="w-full py-3 bg-gray-800 text-white rounded hover:bg-gray-900 font-medium hidden">Descargar PNG</button>
    </main>

    <script>
        // --- ESTADO ---
        let chartInstance = null;
        let cyInstance = null;
        let nodeIdCounter = 0;
        const MAX_ROWS = 20;

        // --- DOM ---
        const vizSelect = document.getElementById('viz-type');
        const formContainer = document.getElementById('form-container');
        const btnAdd = document.getElementById('btn-add');
        const btnGenerate = document.getElementById('btn-generate');
        const btnDownload = document.getElementById('btn-download');
        const chartContainer = document.getElementById('chart-container');
        const sourceRadios = document.querySelectorAll('input[name="source"]');

        // --- INICIALIZACIÓN ---
        vizSelect.addEventListener('change', () => {
            clearState();
            renderForm();
        });
        sourceRadios.forEach(r => r.addEventListener('change', () => {
            clearState();
            renderForm();
        }));
        btnAdd.addEventListener('click', addRow);
        btnGenerate.addEventListener('click', handleGenerate);
        btnDownload.addEventListener('click', downloadPNG);

        // --- LÓGICA PRINCIPAL ---
        function clearState() {
            formContainer.innerHTML = '';
            chartContainer.innerHTML = '<p class="text-gray-400">El gráfico aparecerá aquí</p>';
            btnDownload.classList.add('hidden');
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            if (cyInstance) { cyInstance.destroy(); cyInstance = null; }
            nodeIdCounter = 0;
        }

        function renderForm() {
            const viz = vizSelect.value;
            const isFile = document.querySelector('input[name="source"]:checked').value === 'file';
            
            if (isFile) {
                formContainer.innerHTML = `
                    <div class="p-4 border-2 border-dashed border-gray-300 rounded text-center">
                        <p class="mb-2">Sube un CSV con columnas: <code>label, value</code> (o <code>source, target</code> para redes)</p>
                        <input type="file" id="file-input" accept=".csv" class="mx-auto">
                    </div>`;
                btnAdd.classList.add('hidden');
                return;
            }

            btnAdd.classList.remove('hidden');
            // Encabezados
            let headers = '';
            if (viz === 'bar' || viz === 'line') headers = '<div class="grid grid-cols-2 gap-4 font-bold text-sm text-gray-600"><div>Etiqueta</div><div>Valor</div></div>';
            if (viz === 'network') headers = '<div class="grid grid-cols-1 gap-2 font-bold text-sm text-gray-600"><div>Nodos (ID - Nombre)</div><div class="mt-4">Conexiones (Origen → Destino)</div></div>';
            if (viz === 'flowchart') headers = '<div class="grid grid-cols-3 gap-4 font-bold text-sm text-gray-600"><div>ID Paso</div><div>Texto</div><div>Siguiente ID</div></div>';
            
            formContainer.innerHTML = `<div id="form-rows" class="space-y-3">${headers}</div>`;
            
            // Añadir 3 filas iniciales
            for(let i=0; i<3; i++) addRow();
        }

        function addRow() {
            const viz = vizSelect.value;
            const rowsContainer = document.getElementById('form-rows');
            if (!rowsContainer || rowsContainer.querySelectorAll('.node-row, .data-row, .flow-row').length >= MAX_ROWS) return;

            const rowId = `row-${Date.now()}-${Math.random()}`;
            let html = '';

            if (viz === 'bar' || viz === 'line') {
                html = `
                <div class="data-row grid grid-cols-2 gap-4 items-end relative group">
                    <div>
                        <input type="text" class="w-full p-2 border rounded input-label" placeholder="Ej: Enero">
                        <span class="error-msg">Requerido</span>
                    </div>
                    <div>
                        <input type="number" class="w-full p-2 border rounded input-value" placeholder="Ej: 100">
                        <span class="error-msg">Requerido (número)</span>
                    </div>
                    <button onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                </div>`;
            } else if (viz === 'network') {
                // Nodo
                nodeIdCounter++;
                html = `
                <div class="node-row p-2 bg-gray-50 rounded border relative group">
                    <div class="flex items-center space-x-2">
                        <span class="font-mono text-xs text-gray-500 w-6">#${nodeIdCounter}</span>
                        <input type="text" class="flex-1 p-2 border rounded input-node-name" placeholder="Nombre del Nodo">
                        <input type="hidden" class="input-node-id" value="${nodeIdCounter}">
                        <span class="error-msg">Nombre requerido</span>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove(); updateDropdowns()" class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                </div>`;
                // Si es la primera vez, añadir sección de conexiones
                if (!document.getElementById('conn-section')) {
                    html += `<div id="conn-section" class="mt-4 pt-4 border-t"><h4 class="font-bold text-sm mb-2">Conexiones</h4><div id="conn-rows" class="space-y-2"></div><button type="button" id="btn-add-conn" class="text-xs text-indigo-600 mt-2 underline">+ Añadir Conexión</button></div>`;
                }
            } else if (viz === 'flowchart') {
                html = `
                <div class="flow-row grid grid-cols-3 gap-4 items-end relative group">
                    <div><input type="text" class="w-full p-2 border rounded input-flow-id" placeholder="A"></div>
                    <div><input type="text" class="w-full p-2 border rounded input-flow-text" placeholder="Inicio"></div>
                    <div><input type="text" class="w-full p-2 border rounded input-flow-next" placeholder="B (vacío si final)"></div>
                    <button onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                </div>`;
            }

            rowsContainer.insertAdjacentHTML('beforeend', html);

            // Listener especial para conexiones en Network
            if (viz === 'network' && document.getElementById('btn-add-conn')) {
                document.getElementById('btn-add-conn').onclick = () => {
                    const connContainer = document.getElementById('conn-rows');
                    const connId = `conn-${Date.now()}`;
                    const connHtml = `
                        <div class="conn-row grid grid-cols-2 gap-2 items-center relative group">
                            <select class="w-full p-2 border rounded input-conn-src"><option>Selecciona...</option></select>
                            <select class="w-full p-2 border rounded input-conn-dst"><option>Selecciona...</option></select>
                            <button onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                        </div>`;
                    connContainer.insertAdjacentHTML('beforeend', connHtml);
                    updateDropdowns();
                };
                // Inicializar 1 conexión
                if (!document.querySelector('.conn-row')) document.getElementById('btn-add-conn').click();
            }
        }

        function updateDropdowns() {
            const selects = document.querySelectorAll('.input-conn-src, .input-conn-dst');
            const nodes = document.querySelectorAll('.node-row');
            let options = '<option value="">Selecciona...</option>';
            nodes.forEach((row, idx) => {
                const name = row.querySelector('.input-node-name').value || `Nodo ${idx+1}`;
                const id = row.querySelector('.input-node-id').value;
                options += `<option value="${id}">${id} - ${name}</option>`;
            });
            selects.forEach(sel => {
                const current = sel.value;
                sel.innerHTML = options;
                sel.value = current;
            });
        }

        // --- VALIDACIÓN ---
        function validate() {
            let isValid = true;
            const viz = vizSelect.value;
            // Limpiar errores previos
            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
            document.querySelectorAll('input, select').forEach(el => el.classList.remove('has-error'));

            if (viz === 'bar' || viz === 'line') {
                const rows = document.querySelectorAll('.data-row');
                if (rows.length === 0) { showAlert('Añade al menos 1 fila'); return false; }
                rows.forEach(row => {
                    const label = row.querySelector('.input-label');
                    const value = row.querySelector('.input-value');
                    if (!label.value.trim()) { showError(label); isValid = false; }
                    if (!value.value.trim() || isNaN(value.value)) { showError(value); isValid = false; }
                });
            } else if (viz === 'network') {
                const nodes = document.querySelectorAll('.node-row');
                if (nodes.length < 2) { showAlert('Mínimo 2 nodos para una red'); return false; }
                nodes.forEach(row => {
                    const name = row.querySelector('.input-node-name');
                    if (!name.value.trim()) { showError(name); isValid = false; }
                });
                const conns = document.querySelectorAll('.conn-row');
                conns.forEach(row => {
                    const src = row.querySelector('.input-conn-src');
                    const dst = row.querySelector('.input-conn-dst');
                    if (!src.value || !dst.value) { showError(src); showError(dst); isValid = false; }
                });
            } else if (viz === 'flowchart') {
                const rows = document.querySelectorAll('.flow-row');
                if (rows.length === 0) { showAlert('Añade al menos 1 paso'); return false; }
                rows.forEach(row => {
                    const id = row.querySelector('.input-flow-id');
                    const text = row.querySelector('.input-flow-text');
                    if (!id.value.trim() || !text.value.trim()) { showError(id); showError(text); isValid = false; }
                });
            }
            return isValid;
        }

        function showError(input) {
            input.classList.add('has-error');
            const err = input.parentElement.querySelector('.error-msg');
            if (err) err.style.display = 'block';
        }

        function showAlert(msg) {
            alert(msg); // Fallback simple
        }

        // --- GENERACIÓN ---
        async function handleGenerate() {
            if (!validate()) return;
            const viz = vizSelect.value;
            chartContainer.innerHTML = ''; // Limpiar

            if (viz === 'bar' || viz === 'line') {
                const labels = [], data = [];
                document.querySelectorAll('.data-row').forEach(row => {
                    labels.push(row.querySelector('.input-label').value);
                    data.push(parseFloat(row.querySelector('.input-value').value));
                });
                renderChart(viz, labels, data);
            } else if (viz === 'network') {
                const nodes = [], edges = [];
                document.querySelectorAll('.node-row').forEach(row => {
                    nodes.push({ data: { id: row.querySelector('.input-node-id').value, label: row.querySelector('.input-node-name').value } });
                });
                document.querySelectorAll('.conn-row').forEach(row => {
                    edges.push({ data: { source: row.querySelector('.input-conn-src').value, target: row.querySelector('.input-conn-dst').value } });
                });
                renderNetwork(nodes, edges);
            } else if (viz === 'flowchart') {
                let definition = 'flowchart TD\n';
                document.querySelectorAll('.flow-row').forEach(row => {
                    const id = row.querySelector('.input-flow-id').value.trim();
                    const text = row.querySelector('.input-flow-text').value.trim();
                    const next = row.querySelector('.input-flow-next').value.trim();
                    definition += `${id}[${text}]`;
                    if (next) definition += ` --> ${next}\n`;
                    else definition += `\n`;
                });
                renderFlowchart(definition);
            }

            btnDownload.classList.remove('hidden');
        }

        // --- RENDERIZADO ---
        function renderChart(type, labels, data) {
            const ctx = document.createElement('canvas');
            chartContainer.appendChild(ctx);
            chartInstance = new Chart(ctx, {
                type: type,
                data: { labels, datasets: [{ label: 'Datos', data, backgroundColor: 'rgba(79, 70, 229, 0.5)', borderColor: 'rgba(79, 70, 229, 1)', borderWidth: 2 }] },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function renderNetwork(nodes, edges) {
            cyInstance = cytoscape({
                container: chartContainer,
                elements: [...nodes, ...edges],
                style: [
                    { selector: 'node', style: { 'label': 'data(label)', 'background-color': '#4f46e5', 'color': '#fff', 'text-valign': 'center', 'text-halign': 'center' } },
                    { selector: 'edge', style: { 'width': 2, 'line-color': '#9ca3af', 'target-arrow-color': '#9ca3af', 'target-arrow-shape': 'triangle' } }
                ],
                layout: { name: 'grid' }
            });
        }

        async function renderFlowchart(definition) {
            const { svg } = await window.mermaid.render('mermaid-svg', definition);
            chartContainer.innerHTML = svg;
            chartContainer.querySelector('svg').style.width = '100%';
            chartContainer.querySelector('svg').style.height = '100%';
        }

        // --- DESCARGA ---
        function downloadPNG() {
            html2canvas(chartContainer).then(canvas => {
                const link = document.createElement('a');
                link.download = 'visualizacion.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Init
        renderForm();
    </script>
</body>
</html>
