<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAFIK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.25.0/dist/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false });
        window.mermaid = mermaid;
    </script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        grafik: {
                            bg: '#0a0a0a',
                            card: '#1a1a1a',
                            input: '#262626',
                            accent: '#fbbf24',
                            accentHover: '#f59e0b',
                            text: '#e5e5e5',
                            textMuted: '#737373'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background: #0a0a0a; color: #e5e5e5; }
        .screen { display: none; }
        .screen.active { display: block; }
        .input-dark {
            background: #262626;
            border: 1px solid #404040;
            color: #e5e5e5;
        }
        .input-dark:focus {
            border-color: #fbbf24;
            outline: none;
            box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2);
        }
        .input-dark::placeholder { color: #525252; }
        .btn-grafik {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #0a0a0a;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .btn-grafik:hover {
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }
        .label-grafik {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            color: #737373;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .section-title {
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
            color: #fbbf24;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 3px solid #fbbf24;
            padding-left: 0.75rem;
            margin: 1.5rem 0 1rem 0;
        }
        .select-dark {
            background: #262626;
            border: 1px solid #404040;
            color: #fbbf24;
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }
        .error-msg { color: #ef4444; font-size: 0.75rem; margin-top: 0.25rem; display: none; }
        .has-error { border-color: #ef4444 !important; }
        .btn-add {
            color: #fbbf24;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            display: inline-flex;
            align-items: center;
            margin-top: 0.75rem;
            cursor: pointer;
        }
        .btn-add:hover { color: #f59e0b; }
        .btn-add span {
            width: 1.25rem;
            height: 1.25rem;
            border: 1px solid #fbbf24;
            border-radius: 0.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 0.5rem;
            font-size: 1rem;
            line-height: 1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="border-b border-gray-800 py-6">
        <div class="max-w-4xl mx-auto px-4">
            <h1 class="text-3xl font-bold text-center" style="color: #fbbf24; font-family: 'Courier New', monospace; letter-spacing: 8px;">
                GRAFIK
            </h1>
            <div class="w-24 h-1 bg-gradient-to-r from-amber-400 to-transparent mx-auto mt-2"></div>
        </div>
    </header>

    <main class="flex-1 p-4 max-w-4xl mx-auto w-full space-y-6">
        
        <!-- ==================== PANTALLA 1: FORMULARIO ==================== -->
        <div id="screen-form" class="screen active space-y-6">
            
            <!-- Controles -->
            <div class="bg-[#1a1a1a] p-6 rounded border border-gray-800">
                <p class="label-grafik mb-3">TIPOLOGÍA // SELECCIONA</p>
                <select id="viz-type" class="w-full p-4 select-dark rounded text-lg">
                    <option value="bar">Barras</option>
                    <option value="line">Líneas</option>
                    <option value="pie">Circular (Pastel)</option>
                    <option value="network">Node-Link (Red)</option>
                    <option value="flowchart">Flowchart</option>
                </select>
            </div>

            <div class="bg-[#1a1a1a] p-6 rounded border border-gray-800">
                <p class="label-grafik mb-3">ORIGEN DE DATOS // SOURCE</p>
                <div class="grid grid-cols-2 gap-4">
                    <button id="source-form" class="p-4 rounded font-bold text-sm tracking-wider bg-amber-400 text-black hover:bg-amber-500 transition">
                        FORMULARIO
                    </button>
                    <button id="source-file" class="p-4 rounded font-bold text-sm tracking-wider bg-[#262626] text-gray-400 hover:bg-[#333] transition">
                        CSV_IMPORT
                    </button>
                </div>
            </div>

            <!-- ESCALA -->
            <div id="scale-section" class="bg-[#1a1a1a] p-6 rounded border border-gray-800 hidden">
                <p class="label-grafik mb-3">ESCALA EJE Y // INTERVAL</p>
                <select id="scale-interval" class="w-full p-3 select-dark rounded">
                    <option value="1">1 (Cada unidad)</option>
                    <option value="5">5 (Cada 5 unidades)</option>
                    <option value="10" selected>10 (Cada 10 unidades)</option>
                    <option value="25">25 (Cada 25 unidades)</option>
                    <option value="50">50 (Cada 50 unidades)</option>
                    <option value="100">100 (Cada 100 unidades)</option>
                </select>
            </div>

            <!-- FORMULARIO DINÁMICO -->
            <div id="form-container" class="bg-[#1a1a1a] p-6 rounded border border-gray-800">
                <!-- Se inyecta vía JS -->
            </div>

            <!-- BOTÓN GENERAR -->
            <button id="btn-generate" class="w-full btn-grafik py-4 rounded text-lg tracking-wider shadow-lg">
                GENERAR GRÁFICO
            </button>
        </div>

        <!-- ==================== PANTALLA 2: RESULTADO ==================== -->
        <div id="screen-result" class="screen space-y-6">
            
            <div class="flex justify-between items-center bg-[#1a1a1a] p-4 rounded border border-gray-800">
                <button id="btn-back" class="px-6 py-2 bg-[#262626] text-amber-400 rounded hover:bg-[#333] font-mono text-sm tracking-wider border border-gray-700">
                    ← VOLVER
                </button>
                <h2 class="text-lg font-bold text-gray-300 font-mono tracking-wider">RESULTADO</h2>
                <div class="w-24"></div>
            </div>

            <div id="chart-container" class="bg-[#1a1a1a] p-6 rounded border border-gray-800 min-h-[500px] flex items-center justify-center relative">
                <p class="text-gray-500 font-mono">Esperando procesamiento...</p>
            </div>

            <button id="btn-download" class="w-full btn-grafik py-4 rounded text-lg tracking-wider shadow-lg hidden">
                DESCARGAR PNG
            </button>
        </div>

    </main>

    <footer class="border-t border-gray-800 py-4 mt-8">
        <p class="text-center text-gray-600 font-mono text-xs tracking-wider">
            GRAFIK v1.0 // Industrial Data Visualization
        </p>
    </footer>

    <script>
        // --- ESTADO ---
        let chartInstance = null;
        let cyInstance = null;
        let nodeIdCounter = 0;
        const MAX_ROWS = 20;
        const COMPATIBLE_TYPES = ['bar', 'line', 'pie'];
        let lastCompatibleData = null;
        let lastVizType = null;
        let isFormSource = true;

        // --- DOM ---
        const vizSelect = document.getElementById('viz-type');
        const formContainer = document.getElementById('form-container');
        const btnGenerate = document.getElementById('btn-generate');
        const btnDownload = document.getElementById('btn-download');
        const chartContainer = document.getElementById('chart-container');
        const scaleSection = document.getElementById('scale-section');
        const scaleInterval = document.getElementById('scale-interval');
        const screenForm = document.getElementById('screen-form');
        const screenResult = document.getElementById('screen-result');
        const btnBack = document.getElementById('btn-back');
        const sourceForm = document.getElementById('source-form');
        const sourceFile = document.getElementById('source-file');

        // --- NAVIGATION ---
        btnGenerate.addEventListener('click', () => {
            if (validate()) {
                handleGenerate();
                screenForm.classList.remove('active');
                screenResult.classList.add('active');
                window.scrollTo(0, 0);
            }
        });

        btnBack.addEventListener('click', () => {
            screenResult.classList.remove('active');
            screenForm.classList.add('active');
            window.scrollTo(0, 0);
        });

        sourceForm.addEventListener('click', () => {
            isFormSource = true;
            sourceForm.classList.replace('bg-[#262626]', 'bg-amber-400');
            sourceForm.classList.replace('text-gray-400', 'text-black');
            sourceFile.classList.replace('bg-amber-400', 'bg-[#262626]');
            sourceFile.classList.replace('text-black', 'text-gray-400');
            clearState(false);
            renderForm(false);
            lastVizType = vizSelect.value;
        });

        sourceFile.addEventListener('click', () => {
            isFormSource = false;
            sourceFile.classList.replace('bg-[#262626]', 'bg-amber-400');
            sourceFile.classList.replace('text-gray-400', 'text-black');
            sourceForm.classList.replace('bg-amber-400', 'bg-[#262626]');
            sourceForm.classList.replace('text-black', 'text-gray-400');
            clearState(false);
            renderForm(false);
            lastVizType = vizSelect.value;
        });

        vizSelect.addEventListener('change', () => {
            const newType = vizSelect.value;
            const oldType = lastVizType;
            const keepData = COMPATIBLE_TYPES.includes(newType) && COMPATIBLE_TYPES.includes(oldType) && lastCompatibleData;
            
            clearState(keepData);
            renderForm(keepData);
            lastVizType = newType;
            
            if (newType === 'bar' || newType === 'line') {
                scaleSection.classList.remove('hidden');
            } else {
                scaleSection.classList.add('hidden');
            }
        });

        // --- LOGIC ---
        function clearState(keepData = false) {
            chartContainer.innerHTML = '<p class="text-gray-500 font-mono">Esperando procesamiento...</p>';
            btnDownload.classList.add('hidden');
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            if (cyInstance) { cyInstance.destroy(); cyInstance = null; }
            
            if (!keepData) {
                formContainer.innerHTML = '';
                nodeIdCounter = 0;
                lastCompatibleData = null;
            }
        }

        function renderForm(keepData = false) {
            const viz = vizSelect.value;
            
            if (!isFormSource) {
                formContainer.innerHTML = `
                    <div class="p-6 border-2 border-dashed border-gray-700 rounded text-center">
                        <p class="mb-4 text-gray-400 font-mono text-sm">Sube un archivo CSV con columnas: <span class="text-amber-400">label, value</span></p>
                        <input type="file" id="file-input" accept=".csv" class="mx-auto input-dark p-2 rounded">
                    </div>`;
                return;
            }

            let html = '';
            
            if (COMPATIBLE_TYPES.includes(viz)) {
                html = '<p class="section-title">Datos</p><div id="form-rows" class="space-y-3"></div>';
                html += '<button type="button" id="btn-add-row" class="btn-add"><span>+</span> Añadir fila</button>';
            } else if (viz === 'network') {
                html = '<p class="section-title">Nodos</p><div id="node-rows" class="space-y-3"></div>';
                html += '<button type="button" id="btn-add-node" class="btn-add"><span>+</span> Añadir nodo</button>';
                html += '<p class="section-title">Conexiones</p><div id="conn-rows" class="space-y-3"></div>';
                html += '<button type="button" id="btn-add-conn" class="btn-add"><span>+</span> Añadir conexión</button>';
            } else if (viz === 'flowchart') {
                html = '<p class="section-title">Flujo</p><div id="form-rows" class="space-y-3"></div>';
                html += '<button type="button" id="btn-add-row" class="btn-add"><span>+</span> Añadir paso</button>';
            }
            
            formContainer.innerHTML = html;
            
            // Event listeners para botones
            if (viz === 'network') {
                document.getElementById('btn-add-node').addEventListener('click', () => addRow());
                document.getElementById('btn-add-conn').addEventListener('click', () => addConnection());
                // Inicializar: 1 nodo + 1 conexión
                addRow();
                setTimeout(() => addConnection(), 50);
            } else {
                document.getElementById('btn-add-row').addEventListener('click', () => addRow());
                // Inicializar: 2 filas
                if (keepData && lastCompatibleData && COMPATIBLE_TYPES.includes(viz)) {
                    lastCompatibleData.forEach(row => addRow(row.label, row.value));
                } else {
                    addRow();
                    addRow();
                }
            }
        }

        function addRow(label = '', value = '') {
            const viz = vizSelect.value;
            let container;
            
            if (viz === 'network') {
                container = document.getElementById('node-rows');
                nodeIdCounter++;
                
                const html = `
                <div class="p-3 rounded relative group" style="background: #1a1a1a; border: 1px solid #404040;">
                    <div class="flex items-center space-x-3">
                        <span class="font-mono text-xs text-amber-400 w-12">#${String(nodeIdCounter).padStart(2, '0')}</span>
                        <input type="text" class="flex-1 p-2 input-dark rounded input-node-name" placeholder="Nombre del nodo" value="">
                        <input type="hidden" class="input-node-id" value="${nodeIdCounter}">
                        <span class="error-msg">Requerido</span>
                    </div>
                    <button type="button" onclick="this.parentElement.parentElement.remove(); updateDropdowns()" class="absolute -right-2 -top-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                </div>`;
                
                container.insertAdjacentHTML('beforeend', html);
                updateDropdowns();
            } else {
                container = document.getElementById('form-rows');
                const currentRows = container.querySelectorAll('.data-row, .flow-row');
                if (currentRows.length >= MAX_ROWS) return;
                
                if (COMPATIBLE_TYPES.includes(viz)) {
                    const html = `
                    <div class="data-row p-3 rounded grid grid-cols-2 gap-3 relative group" style="background: #1a1a1a; border: 1px solid #404040;">
                        <div>
                            <input type="text" class="w-full p-2 input-dark rounded input-label" placeholder="Etiqueta" value="${label}">
                            <span class="error-msg">Requerido</span>
                        </div>
                        <div>
                            <input type="number" class="w-full p-2 input-dark rounded input-value" placeholder="Valor" value="${value}">
                            <span class="error-msg">Requerido</span>
                        </div>
                        <button type="button" onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                    </div>`;
                    container.insertAdjacentHTML('beforeend', html);
                } else if (viz === 'flowchart') {
                    const html = `
                    <div class="flow-row p-3 rounded grid grid-cols-3 gap-3 relative group" style="background: #1a1a1a; border: 1px solid #404040;">
                        <div><input type="text" class="w-full p-2 input-dark rounded input-flow-id" placeholder="ID (A)"></div>
                        <div><input type="text" class="w-full p-2 input-dark rounded input-flow-text" placeholder="Texto"></div>
                        <div><input type="text" class="w-full p-2 input-dark rounded input-flow-next" placeholder="Siguiente (vacío=fin)"></div>
                        <button type="button" onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                    </div>`;
                    container.insertAdjacentHTML('beforeend', html);
                }
            }
        }

        function addConnection() {
            const container = document.getElementById('conn-rows');
            const html = `
                <div class="conn-row p-3 rounded grid grid-cols-2 gap-3 relative group" style="background: #1a1a1a; border: 1px solid #404040;">
                    <select class="w-full p-2 select-dark rounded input-conn-src"><option value="">Selecciona origen</option></select>
                    <select class="w-full p-2 select-dark rounded input-conn-dst"><option value="">Selecciona destino</option></select>
                    <button type="button" onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-600 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                </div>`;
            container.insertAdjacentHTML('beforeend', html);
            updateDropdowns();
        }

        function updateDropdowns() {
            const selects = document.querySelectorAll('.input-conn-src, .input-conn-dst');
            const nodes = document.querySelectorAll('#node-rows > div');
            let options = '<option value="">Selecciona...</option>';
            nodes.forEach((row, idx) => {
                const name = row.querySelector('.input-node-name').value || `Nodo ${idx+1}`;
                const id = row.querySelector('.input-node-id').value;
                options += `<option value="${id}">${id} - ${name}</option>`;
            });
            selects.forEach(sel => {
                const current = sel.value;
                sel.innerHTML = options;
                sel.value = current;
            });
        }

        function validate() {
            let isValid = true;
            const viz = vizSelect.value;
            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
            document.querySelectorAll('input, select').forEach(el => el.classList.remove('has-error'));

            if (COMPATIBLE_TYPES.includes(viz)) {
                const rows = document.querySelectorAll('.data-row');
                if (rows.length === 0) { alert('Añade al menos 1 fila'); return false; }
                rows.forEach(row => {
                    const label = row.querySelector('.input-label');
                    const value = row.querySelector('.input-value');
                    if (!label.value.trim()) { showError(label); isValid = false; }
                    if (!value.value.trim() || isNaN(value.value)) { showError(value); isValid = false; }
                });
            } else if (viz === 'network') {
                const nodes = document.querySelectorAll('#node-rows > div');
                if (nodes.length < 2) { alert('Mínimo 2 nodos para una red'); return false; }
                nodes.forEach(row => {
                    const name = row.querySelector('.input-node-name');
                    if (!name.value.trim()) { showError(name); isValid = false; }
                });
                const conns = document.querySelectorAll('.conn-row');
                conns.forEach(row => {
                    const src = row.querySelector('.input-conn-src');
                    const dst = row.querySelector('.input-conn-dst');
                    if (!src.value || !dst.value) { showError(src); showError(dst); isValid = false; }
                });
            } else if (viz === 'flowchart') {
                const rows = document.querySelectorAll('.flow-row');
                if (rows.length === 0) { alert('Añade al menos 1 paso'); return false; }
                rows.forEach(row => {
                    const id = row.querySelector('.input-flow-id');
                    const text = row.querySelector('.input-flow-text');
                    if (!id.value.trim() || !text.value.trim()) { showError(id); showError(text); isValid = false; }
                });
            }
            return isValid;
        }

        function showError(input) {
            input.classList.add('has-error');
            const err = input.parentElement.querySelector('.error-msg');
            if (err) err.style.display = 'block';
        }

        async function handleGenerate() {
            const viz = vizSelect.value;
            chartContainer.innerHTML = '';

            if (COMPATIBLE_TYPES.includes(viz)) {
                const labels = [], data = [];
                document.querySelectorAll('.data-row').forEach(row => {
                    labels.push(row.querySelector('.input-label').value);
                    data.push(parseFloat(row.querySelector('.input-value').value));
                });
                lastCompatibleData = labels.map((l, i) => ({ label: l, value: data[i] }));
                
                const interval = parseInt(scaleInterval.value);
                renderChart(viz, labels, data, interval);
            } else if (viz === 'network') {
                const nodes = [], edges = [];
                document.querySelectorAll('#node-rows > div').forEach(row => {
                    nodes.push({ 
                        data: { 
                            id: row.querySelector('.input-node-id').value, 
                            label: row.querySelector('.input-node-name').value 
                        } 
                    });
                });
                document.querySelectorAll('.conn-row').forEach(row => {
                    edges.push({ 
                        data: { 
                            source: row.querySelector('.input-conn-src').value, 
                            target: row.querySelector('.input-conn-dst').value 
                        } 
                    });
                });
                renderNetwork(nodes, edges);
            } else if (viz === 'flowchart') {
                let definition = 'flowchart TD\n';
                document.querySelectorAll('.flow-row').forEach(row => {
                    const id = row.querySelector('.input-flow-id').value.trim();
                    const text = row.querySelector('.input-flow-text').value.trim();
                    const next = row.querySelector('.input-flow-next').value.trim();
                    definition += `${id}[${text}]`;
                    if (next) definition += ` --> ${next}\n`;
                    else definition += `\n`;
                });
                renderFlowchart(definition);
            }

            btnDownload.classList.remove('hidden');
        }

        function renderChart(type, labels, data, interval) {
            const ctx = document.createElement('canvas');
            chartContainer.appendChild(ctx);
            
            const colors = [
                'rgba(251, 191, 36, 0.8)',
                'rgba(34, 197, 94, 0.8)',
                'rgba(239, 68, 68, 0.8)',
                'rgba(59, 130, 246, 0.8)',
                'rgba(168, 85, 247, 0.8)'
            ];
            
            chartInstance = new Chart(ctx, {
                type: type,
                data: { 
                    labels, 
                    datasets: [{ 
                        label: 'Datos', 
                        data, 
                        backgroundColor: type === 'pie' ? colors : 'rgba(251, 191, 36, 0.6)',
                        borderColor: type === 'pie' ? '#1a1a1a' : '#fbbf24',
                        borderWidth: 2 
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { 
                        legend: { 
                            display: type === 'pie',
                            labels: { color: '#e5e5e5', font: { family: 'Courier New' } }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { 
                                color: '#737373',
                                font: { family: 'Courier New' },
                                stepSize: interval
                            },
                            grid: { color: '#404040' }
                        },
                        x: {
                            ticks: { color: '#737373', font: { family: 'Courier New' } },
                            grid: { color: '#404040' }
                        }
                    }
                }
            });
        }

        function renderNetwork(nodes, edges) {
            cyInstance = cytoscape({
                container: chartContainer,
                elements: [...nodes, ...edges],
                style: [
                    { 
                        selector: 'node', 
                        style: { 
                            'label': 'data(label)', 
                            'background-color': '#fbbf24', 
                            'color': '#0a0a0a', 
                            'text-valign': 'center', 
                            'text-halign': 'center',
                            'width': 50,
                            'height': 50,
                            'font-family': 'Courier New',
                            'font-weight': 'bold'
                        } 
                    },
                    { 
                        selector: 'edge', 
                        style: { 
                            'width': 2, 
                            'line-color': '#737373', 
                            'target-arrow-color': '#737373', 
                            'target-arrow-shape': 'triangle' 
                        } 
                    }
                ],
                layout: { name: 'cose', animate: true, nodeSpacing: 50 }
            });
        }

        async function renderFlowchart(definition) {
            const { svg } = await window.mermaid.render('mermaid-svg', definition);
            chartContainer.innerHTML = svg;
            const svgEl = chartContainer.querySelector('svg');
            svgEl.style.width = '100%';
            svgEl.style.height = '100%';
            svgEl.style.background = '#1a1a1a';
        }

        function downloadPNG() {
            html2canvas(chartContainer).then(canvas => {
                const link = document.createElement('a');
                link.download = 'GRAFIK_EXPORT.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Init
        lastVizType = vizSelect.value;
        renderForm();
    </script>
</body>
</html>
