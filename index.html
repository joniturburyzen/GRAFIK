<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador de Datos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cytoscape@3.25.0/dist/cytoscape.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: false });
        window.mermaid = mermaid;
    </script>
    <style>
        .error-msg { color: #ef4444; font-size: 0.75rem; margin-top: 0.25rem; display: none; }
        .has-error { border-color: #ef4444; }
        .screen { display: none; }
        .screen.active { display: block; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <header class="bg-indigo-600 text-white p-4 shadow">
        <h1 class="text-xl font-bold">Visualizador de Datos</h1>
    </header>

    <main class="flex-1 p-4 max-w-5xl mx-auto w-full space-y-6">
        
        <!-- ==================== PANTALLA 1: FORMULARIO ==================== -->
        <div id="screen-form" class="screen active space-y-6">
            
            <!-- Controles -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-white p-4 rounded shadow">
                <div>
                    <label class="block text-sm font-medium mb-1">Visualización</label>
                    <select id="viz-type" class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500">
                        <option value="bar">Barras</option>
                        <option value="line">Líneas</option>
                        <option value="pie">Circular (Pastel)</option>
                        <option value="network">Node-Link (Red)</option>
                        <option value="flowchart">Flowchart</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Origen de Datos</label>
                    <div class="flex space-x-4 mt-2">
                        <label class="flex items-center"><input type="radio" name="source" value="form" checked class="mr-2"> Formulario</label>
                        <label class="flex items-center"><input type="radio" name="source" value="file" class="mr-2"> Archivo (CSV)</label>
                    </div>
                </div>
            </div>

            <!-- OPCIÓN DE ESCALA (solo Barras y Líneas) -->
            <div id="scale-section" class="bg-white p-4 rounded shadow hidden">
                <label class="block text-sm font-medium mb-2">Escala del Eje Y</label>
                <div class="flex space-x-4">
                    <label class="flex items-center"><input type="radio" name="scale" value="linear" checked class="mr-2"> Lineal</label>
                    <label class="flex items-center"><input type="radio" name="scale" value="logarithmic" class="mr-2"> Logarítmica</label>
                </div>
            </div>

            <!-- Formulario Dinámico -->
            <div id="form-container" class="bg-white p-4 rounded shadow space-y-4">
                <!-- Se inyecta vía JS -->
            </div>

            <!-- Acciones -->
            <div class="flex justify-between items-center">
                <button id="btn-add" class="px-4 py-2 bg-indigo-100 text-indigo-700 rounded hover:bg-indigo-200 font-medium">+ Añadir</button>
                <button id="btn-generate" class="px-6 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-bold shadow">Generar Gráfico</button>
            </div>
        </div>

        <!-- ==================== PANTALLA 2: RESULTADO ==================== -->
        <div id="screen-result" class="screen space-y-6">
            
            <!-- Header Resultado -->
            <div class="flex justify-between items-center bg-white p-4 rounded shadow">
                <button id="btn-back" class="px-4 py-2 bg-gray-600 text-white rounded hover:bg-gray-700 font-medium">← Volver al Formulario</button>
                <h2 class="text-lg font-bold text-gray-700">Resultado</h2>
                <div class="w-32"></div> <!-- Spacer para centrar -->
            </div>

            <!-- Resultado -->
            <div id="chart-container" class="bg-white p-4 rounded shadow min-h-[500px] flex items-center justify-center relative">
                <p class="text-gray-400">El gráfico aparecerá aquí</p>
            </div>

            <!-- Download -->
            <button id="btn-download" class="w-full py-3 bg-indigo-600 text-white rounded hover:bg-indigo-700 font-bold hidden">Descargar PNG</button>
        </div>

    </main>

    <script>
        // --- ESTADO ---
        let chartInstance = null;
        let cyInstance = null;
        let nodeIdCounter = 0;
        const MAX_ROWS = 20;
        const COMPATIBLE_TYPES = ['bar', 'line', 'pie'];
        let lastCompatibleData = null;
        let lastVizType = null;

        // --- DOM ---
        const vizSelect = document.getElementById('viz-type');
        const formContainer = document.getElementById('form-container');
        const btnAdd = document.getElementById('btn-add');
        const btnGenerate = document.getElementById('btn-generate');
        const btnDownload = document.getElementById('btn-download');
        const chartContainer = document.getElementById('chart-container');
        const sourceRadios = document.querySelectorAll('input[name="source"]');
        const scaleSection = document.getElementById('scale-section');
        const screenForm = document.getElementById('screen-form');
        const screenResult = document.getElementById('screen-result');
        const btnBack = document.getElementById('btn-back');

        // --- NAVIGATION ---
        btnGenerate.addEventListener('click', () => {
            if (validate()) {
                handleGenerate();
                screenForm.classList.remove('active');
                screenResult.classList.add('active');
                window.scrollTo(0, 0);
            }
        });

        btnBack.addEventListener('click', () => {
            screenResult.classList.remove('active');
            screenForm.classList.add('active');
            window.scrollTo(0, 0);
        });

        // --- EVENTS ---
        vizSelect.addEventListener('change', () => {
            const newType = vizSelect.value;
            const oldType = lastVizType;
            const keepData = COMPATIBLE_TYPES.includes(newType) && COMPATIBLE_TYPES.includes(oldType) && lastCompatibleData;
            
            clearState(keepData);
            renderForm(keepData);
            lastVizType = newType;
            
            // Mostrar/ocultar escala
            if (newType === 'bar' || newType === 'line') {
                scaleSection.classList.remove('hidden');
            } else {
                scaleSection.classList.add('hidden');
            }
        });
        
        sourceRadios.forEach(r => r.addEventListener('change', () => {
            clearState(false);
            renderForm(false);
            lastVizType = vizSelect.value;
        }));
        
        btnAdd.addEventListener('click', addRow);
        btnDownload.addEventListener('click', downloadPNG);

        // --- LOGIC ---
        function clearState(keepData = false) {
            chartContainer.innerHTML = '<p class="text-gray-400">El gráfico aparecerá aquí</p>';
            btnDownload.classList.add('hidden');
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            if (cyInstance) { cyInstance.destroy(); cyInstance = null; }
            
            if (!keepData) {
                formContainer.innerHTML = '';
                nodeIdCounter = 0;
                lastCompatibleData = null;
            }
        }

        function renderForm(keepData = false) {
            const viz = vizSelect.value;
            const isFile = document.querySelector('input[name="source"]:checked').value === 'file';
            
            if (isFile) {
                formContainer.innerHTML = `
                    <div class="p-4 border-2 border-dashed border-gray-300 rounded text-center">
                        <p class="mb-2">Sube un CSV con columnas: <code>label, value</code> (o <code>source, target</code> para redes)</p>
                        <input type="file" id="file-input" accept=".csv" class="mx-auto">
                    </div>`;
                btnAdd.classList.add('hidden');
                return;
            }

            btnAdd.classList.remove('hidden');
            
            let headers = '';
            if (COMPATIBLE_TYPES.includes(viz)) {
                headers = '<div class="grid grid-cols-2 gap-4 font-bold text-sm text-gray-600 mb-2"><div>Etiqueta</div><div>Valor</div></div>';
            } else if (viz === 'network') {
                headers = '<div class="font-bold text-sm text-gray-600 mb-2">Nodos</div>';
            } else if (viz === 'flowchart') {
                headers = '<div class="grid grid-cols-3 gap-4 font-bold text-sm text-gray-600 mb-2"><div>ID Paso</div><div>Texto</div><div>Siguiente ID</div></div>';
            }
            
            formContainer.innerHTML = `<div id="form-rows" class="space-y-3">${headers}</div>`;
            
            if (keepData && lastCompatibleData && COMPATIBLE_TYPES.includes(viz)) {
                lastCompatibleData.forEach(row => addRow(row.label, row.value));
            } else {
                if (viz === 'network') {
                    addRow(); // 1 nodo inicial
                    // Sección de conexiones separada
                    setTimeout(() => {
                        const connSection = document.createElement('div');
                        connSection.id = 'conn-section';
                        connSection.className = 'mt-6 pt-4 border-t';
                        connSection.innerHTML = `
                            <div class="font-bold text-sm text-gray-600 mb-2">Conexiones</div>
                            <div id="conn-rows" class="space-y-2"></div>
                            <button type="button" id="btn-add-conn" class="text-xs text-indigo-600 mt-2 underline">+ Añadir Conexión</button>
                        `;
                        document.getElementById('form-rows').appendChild(connSection);
                        
                        document.getElementById('btn-add-conn').onclick = () => {
                            const connContainer = document.getElementById('conn-rows');
                            const connHtml = `
                                <div class="conn-row grid grid-cols-2 gap-2 items-center relative group">
                                    <select class="w-full p-2 border rounded input-conn-src"><option>Selecciona...</option></select>
                                    <select class="w-full p-2 border rounded input-conn-dst"><option>Selecciona...</option></select>
                                    <button type="button" onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                                </div>`;
                            connContainer.insertAdjacentHTML('beforeend', connHtml);
                            updateDropdowns();
                        };
                        document.getElementById('btn-add-conn').click(); // 1 conexión inicial
                    }, 0);
                } else {
                    for(let i=0; i<2; i++) addRow();
                }
            }
        }

        function addRow(label = '', value = '') {
            const viz = vizSelect.value;
            const rowsContainer = document.getElementById('form-rows');
            if (!rowsContainer) return;
            
            const currentRows = rowsContainer.querySelectorAll('.node-row, .data-row, .flow-row');
            if (currentRows.length >= MAX_ROWS) return;

            nodeIdCounter++;
            let html = '';

            if (COMPATIBLE_TYPES.includes(viz)) {
                html = `
                <div class="data-row grid grid-cols-2 gap-4 items-end relative group">
                    <div>
                        <input type="text" class="w-full p-2 border rounded input-label" placeholder="Ej: Enero" value="${label}">
                        <span class="error-msg">Requerido</span>
                    </div>
                    <div>
                        <input type="number" class="w-full p-2 border rounded input-value" placeholder="Ej: 100" value="${value}">
                        <span class="error-msg">Requerido (número)</span>
                    </div>
                    <button type="button" onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                </div>`;
            } else if (viz === 'network') {
                html = `
                <div class="node-row p-2 bg-gray-50 rounded border relative group">
                    <div class="flex items-center space-x-2">
                        <span class="font-mono text-xs text-gray-500 w-8">#${nodeIdCounter}</span>
                        <input type="text" class="flex-1 p-2 border rounded input-node-name" placeholder="Nombre del Nodo">
                        <input type="hidden" class="input-node-id" value="${nodeIdCounter}">
                        <span class="error-msg">Nombre requerido</span>
                    </div>
                    <button type="button" onclick="this.parentElement.remove(); updateDropdowns()" class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                </div>`;
            } else if (viz === 'flowchart') {
                html = `
                <div class="flow-row grid grid-cols-3 gap-4 items-end relative group">
                    <div><input type="text" class="w-full p-2 border rounded input-flow-id" placeholder="A"></div>
                    <div><input type="text" class="w-full p-2 border rounded input-flow-text" placeholder="Inicio"></div>
                    <div><input type="text" class="w-full p-2 border rounded input-flow-next" placeholder="B (vacío si final)"></div>
                    <button type="button" onclick="this.parentElement.remove()" class="absolute -right-2 -top-2 bg-red-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs opacity-0 group-hover:opacity-100">×</button>
                </div>`;
            }

            rowsContainer.insertAdjacentHTML('beforeend', html);
            
            if (viz === 'network') {
                updateDropdowns();
            }
        }

        function updateDropdowns() {
            const selects = document.querySelectorAll('.input-conn-src, .input-conn-dst');
            const nodes = document.querySelectorAll('.node-row');
            let options = '<option value="">Selecciona...</option>';
            nodes.forEach((row, idx) => {
                const name = row.querySelector('.input-node-name').value || `Nodo ${idx+1}`;
                const id = row.querySelector('.input-node-id').value;
                options += `<option value="${id}">${id} - ${name}</option>`;
            });
            selects.forEach(sel => {
                const current = sel.value;
                sel.innerHTML = options;
                sel.value = current;
            });
        }

        function validate() {
            let isValid = true;
            const viz = vizSelect.value;
            document.querySelectorAll('.error-msg').forEach(el => el.style.display = 'none');
            document.querySelectorAll('input, select').forEach(el => el.classList.remove('has-error'));

            if (COMPATIBLE_TYPES.includes(viz)) {
                const rows = document.querySelectorAll('.data-row');
                if (rows.length === 0) { alert('Añade al menos 1 fila'); return false; }
                rows.forEach(row => {
                    const label = row.querySelector('.input-label');
                    const value = row.querySelector('.input-value');
                    if (!label.value.trim()) { showError(label); isValid = false; }
                    if (!value.value.trim() || isNaN(value.value)) { showError(value); isValid = false; }
                });
            } else if (viz === 'network') {
                const nodes = document.querySelectorAll('.node-row');
                if (nodes.length < 2) { alert('Mínimo 2 nodos para una red'); return false; }
                nodes.forEach(row => {
                    const name = row.querySelector('.input-node-name');
                    if (!name.value.trim()) { showError(name); isValid = false; }
                });
                const conns = document.querySelectorAll('.conn-row');
                conns.forEach(row => {
                    const src = row.querySelector('.input-conn-src');
                    const dst = row.querySelector('.input-conn-dst');
                    if (!src.value || !dst.value) { showError(src); showError(dst); isValid = false; }
                });
            } else if (viz === 'flowchart') {
                const rows = document.querySelectorAll('.flow-row');
                if (rows.length === 0) { alert('Añade al menos 1 paso'); return false; }
                rows.forEach(row => {
                    const id = row.querySelector('.input-flow-id');
                    const text = row.querySelector('.input-flow-text');
                    if (!id.value.trim() || !text.value.trim()) { showError(id); showError(text); isValid = false; }
                });
            }
            return isValid;
        }

        function showError(input) {
            input.classList.add('has-error');
            const err = input.parentElement.querySelector('.error-msg');
            if (err) err.style.display = 'block';
        }

        async function handleGenerate() {
            const viz = vizSelect.value;
            chartContainer.innerHTML = '';

            if (COMPATIBLE_TYPES.includes(viz)) {
                const labels = [], data = [];
                document.querySelectorAll('.data-row').forEach(row => {
                    labels.push(row.querySelector('.input-label').value);
                    data.push(parseFloat(row.querySelector('.input-value').value));
                });
                lastCompatibleData = labels.map((l, i) => ({ label: l, value: data[i] }));
                
                const scale = document.querySelector('input[name="scale"]:checked')?.value || 'linear';
                renderChart(viz, labels, data, scale);
            } else if (viz === 'network') {
                const nodes = [], edges = [];
                document.querySelectorAll('.node-row').forEach(row => {
                    nodes.push({ 
                        data: { 
                            id: row.querySelector('.input-node-id').value, 
                            label: row.querySelector('.input-node-name').value 
                        } 
                    });
                });
                document.querySelectorAll('.conn-row').forEach(row => {
                    edges.push({ 
                        data: { 
                            source: row.querySelector('.input-conn-src').value, 
                            target: row.querySelector('.input-conn-dst').value 
                        } 
                    });
                });
                renderNetwork(nodes, edges);
            } else if (viz === 'flowchart') {
                let definition = 'flowchart TD\n';
                document.querySelectorAll('.flow-row').forEach(row => {
                    const id = row.querySelector('.input-flow-id').value.trim();
                    const text = row.querySelector('.input-flow-text').value.trim();
                    const next = row.querySelector('.input-flow-next').value.trim();
                    definition += `${id}[${text}]`;
                    if (next) definition += ` --> ${next}\n`;
                    else definition += `\n`;
                });
                renderFlowchart(definition);
            }

            btnDownload.classList.remove('hidden');
        }

        function renderChart(type, labels, data, scale) {
            const ctx = document.createElement('canvas');
            chartContainer.appendChild(ctx);
            
            const colors = [
                'rgba(79, 70, 229, 0.7)',
                'rgba(34, 197, 94, 0.7)',
                'rgba(239, 68, 68, 0.7)',
                'rgba(251, 146, 60, 0.7)',
                'rgba(59, 130, 246, 0.7)'
            ];
            
            chartInstance = new Chart(ctx, {
                type: type,
                data: { 
                    labels, 
                    datasets: [{ 
                        label: 'Datos', 
                        data, 
                        backgroundColor: type === 'pie' ? colors : 'rgba(79, 70, 229, 0.5)',
                        borderColor: type === 'pie' ? '#fff' : 'rgba(79, 70, 229, 1)',
                        borderWidth: 2 
                    }] 
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { display: type === 'pie' } },
                    scales: {
                        y: {
                            type: scale,
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        function renderNetwork(nodes, edges) {
            cyInstance = cytoscape({
                container: chartContainer,
                elements: [...nodes, ...edges],
                style: [
                    { selector: 'node', style: { 'label': 'data(label)', 'background-color': '#4f46e5', 'color': '#fff', 'text-valign': 'center', 'text-halign': 'center', 'width': 40, 'height': 40 } },
                    { selector: 'edge', style: { 'width': 2, 'line-color': '#9ca3af', 'target-arrow-color': '#9ca3af', 'target-arrow-shape': 'triangle' } }
                ],
                layout: { name: 'cose', animate: true, nodeSpacing: 50 }
            });
        }

        async function renderFlowchart(definition) {
            const { svg } = await window.mermaid.render('mermaid-svg', definition);
            chartContainer.innerHTML = svg;
            chartContainer.querySelector('svg').style.width = '100%';
            chartContainer.querySelector('svg').style.height = '100%';
        }

        function downloadPNG() {
            html2canvas(chartContainer).then(canvas => {
                const link = document.createElement('a');
                link.download = 'visualizacion.png';
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        // Init
        lastVizType = vizSelect.value;
        renderForm();
    </script>
</body>
</html>
